<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101a2b">
  <meta name="description" content="Minimal local weather: current conditions and animated radar.">
  <title>Weather</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div id="searchBox" class="search-box hidden">
      <input id="searchInput" type="search" placeholder="City name…" autocomplete="off">
      <button id="searchBtn">Search</button>
      <button id="geoBtn" title="Use my location">&#9737; My location</button>
      <ul id="searchResults"></ul>
    </div>
    <section id="alertBanner" class="hidden"></section>
    <section id="status" class="status hidden"></section>

    <div id="viewNow" class="view">
    <section id="current" class="card hidden">
      <div class="now-main">
        <span id="wxIcon" class="wx-icon"></span>
        <span id="temp" class="temp"></span>
      </div>
      <div id="wxDesc" class="wx-desc"></div>
      <div class="detail-grid">
        <div><span class="label">Humidity</span><span id="humidity"></span></div>
        <div><span class="label">Wind</span><span id="wind"></span></div>
        <div><span class="label">Hi / Lo</span><span id="hilo"></span></div>
      </div>
    </section>

    <section id="radarCard" class="card radar-card hidden">
      <div id="map"></div>
      <div class="radar-controls">
        <button id="playBtn" class="icon-btn" aria-label="Play or pause radar">&#10074;&#10074;</button>
        <input id="frameSlider" type="range" min="0" max="10" value="10" step="1" aria-label="Radar frame">
        <span id="frameLabel">now</span>
      </div>
    </section>
    </div>

    <div id="viewToday" class="view hidden">
      <section class="card">
        <h2 class="card-title">Next 24 hours</h2>
        <div id="hourlyList"></div>
      </section>
    </div>

    <div id="viewForecast" class="view hidden">
      <section id="dailyCard" class="card hidden">
        <h2 class="card-title">This week</h2>
        <div id="dailyList"></div>
      </section>
      <section id="forecastCard" class="card hidden">
        <h2 class="card-title">Next 3 periods</h2>
        <div id="forecastList"></div>
      </section>
      <p id="forecastEmpty" class="status hidden">No NWS text forecast for this location (US only).</p>
      <p class="attribution">
        Weather data by <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo.com</a> (CC BY 4.0)
        · Radar: NOAA NEXRAD via <a href="https://mesonet.agron.iastate.edu/" target="_blank" rel="noopener">Iowa State Mesonet</a>
        · Forecast &amp; alerts: <a href="https://www.weather.gov/" target="_blank" rel="noopener">National Weather Service</a>
      </p>
    </div>

    <div id="viewTrips" class="view hidden">
      <div class="trip-add">
        <input id="tripInput" type="search" placeholder="Add a US city…" autocomplete="off">
        <button id="tripSearchBtn">Add</button>
        <ul id="tripResults"></ul>
      </div>
      <div id="tripsList"></div>
    </div>
  </main>

  <nav class="tabbar">
    <button id="tabNow" class="tab active">Now</button>
    <button id="tabToday" class="tab">Hourly</button>
    <button id="tabForecast" class="tab">7-Day</button>
    <button id="tabTrips" class="tab">Trips</button>
    <button id="searchToggle" class="tab tab-icon" title="Change location" aria-label="Change location">&#9906;</button>
    <button id="refreshBtn" class="tab tab-icon" title="Refresh" aria-label="Refresh">&#8635;</button>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
